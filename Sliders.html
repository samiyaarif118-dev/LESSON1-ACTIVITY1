<!DOCTYPE html>

<html>

<head>

    <style>
        .mySlides {

            display: none;

            width: 100%;

            height: 500px;

            object-fit: cover;

        }
    </style>

</head>

<body>

    <!-- Slide Show -->

    <section>

        <img class="mySlides" src="flowers.png">

        <img class="mySlides" src="los angles.jpg">
        <img class="mySlides" src="chicago.jpg">

    </section>

    <script>

        var myIndex = 0;

        carousel();

        function carousel() {

            var i;

            var x = document.getElementsByClassName("mySlides");

            for (i = 0; i < x.length; i++) {

                x[i].style.display = "none";

            }

            myIndex++;

            if (myIndex > x.length) {

                myIndex = 1;

            }

            x[myIndex - 1].style.display = "block";

            setTimeout(carousel, 4000);

        }

    </script>

</body>

</html>
