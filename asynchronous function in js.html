<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynchronous Function in JS</title>
</head>
<body>
    <h2>JavaScript async / await</h2>
    
    <h1 id="output"></h1>
    <script>
        async function product(x, y) {
            let response = await x * y;
            display(response);
        }

        function display(some) {
            document.getElementById("output").innerHTML = some;
        }
    product(6, 657);
</script>
</body>
</html>
