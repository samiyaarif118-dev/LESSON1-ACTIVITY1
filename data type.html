<html>
    <head>
        <title>Data Types in JavaScript</title>
    </head>
    <body>
        <h1> JavaScript  Data Type</h1>
        <script>
            var a = 8;
            var b = 10;
            var c = null;
            var d; // undefined
            document.write("a and b are equal : " + (a == b));
            document.write("<br>");
            document.write("c is null: " + (c === null));
            document.write("<br>");
            document.write("the value of d is undefined: " + (d === undefined));
            document.write("<br>");
            document.write("the value of a is : " + a);
            document.write("<br>");
            document.write("the value of b is : " + b);
        </script>
    </body>
</html>
