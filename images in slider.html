<html>
    <head>
        <title>Image in Slider </title>
    </head>
    <style>
        .mySlides {
            display: none;
            width: 100%;
            height: 490px;
            object-fit: cover;
        }
    </style>
    <body>
        <section>
            <img class="mySlides" src="pizza.jpg">
            <img class="mySlides" src="burger.jpg">
            <img class="mySlides" src="biryani.webp">
            <img class="mySlides" src="nihari.webp">
            <img class="mySlides" src="pasta.webp">
        </section>
        <script>
            var myIndex = 0;
            carousel();
            function carousel() {
                var i;
                var x = document.getElementsByClassName("mySlides");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none";
                }
                myIndex++;
                if (myIndex > x.length) {
                    myIndex = 1;
                }
                x[myIndex - 1].style.display = "block";
                setTimeout(carousel, 2000);
            }
        </script> 
        
    </body>
</html>
