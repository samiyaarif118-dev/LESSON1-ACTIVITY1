<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="website.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pages to Websites</title>
</head>
<body>
        <header>
            <nav class="navbar">
                <div class="logo">Welcome</div>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#Gallery">Gallery</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="home" class="hero">
                <div class="hero-content">
                    <h1>Welcome to My Website</h1>
                    <p>This is a simple webpage created to demonstrate the structure of a website.</p>
                </div>
            </section>
            <section id="Gallery" class="gallery">
                <h1>Gallery</h1>
                <div class="gallery-container">
                    <div class="gallery-item">
                        <img src="image.jpg" alt="Nature">
                    </div>
                    <div class="gallery-item">
                        <img src="mountain.webp" alt="Mountain">
                    </div>
                    <div class="gallery-item">
                        <img src="los angles.jpg" alt="Los Angeles">
                    </div>
                </div>
            </section>
        </main>
</body>
</html>
